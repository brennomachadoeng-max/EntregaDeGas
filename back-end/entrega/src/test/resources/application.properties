spring.application.name=entrega-test

# URL corrigida: removemos o DEFAULT_NULL_ORDER que quebrava o H2
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS entrega_gas
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Instruindo o Hibernate a gerar as tabelas com base nos seus modais
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Mantendo o Dialeto correto do H2 para os testes
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

google.maps.api-key=CHAVE_TESTE